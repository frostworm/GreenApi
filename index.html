<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GREEN API test</title>
<style>
.wrapper {
    display: flex;
    gap: 20px;
    }
.left {
    width: 300px;
}
.right {
    flex: 1;
}
textarea {
    width: 300px;
    height: 600px;
}
</style>
</head>
<body>
    <div class="wrapper">
        <!-- LEFT -->
        <div class="left">
            <div class="section">
                <h2>Реквизиты подключения</h2>
                <input id="idInstance" placeholder="idInstance">
                <input id="apiToken" placeholder="ApiTokenInstance">
            </div>
            <div class="section">
                <h2>Методы</h2>
                <button onclick="getSettings()">getSettings</button>
                <button onclick="getStateInstance()">getStateInstance</button>
            </div>
            <div class="section">
                <h2>Отправить сообщение</h2>
                <input id="phone_message" placeholder="Телефон 79001231212">
                <input id="message" placeholder="Текст сообщения">
                <button onclick = "sendMessage()">sendMessage</button>
            </div>
            <div class="section">
                <h2>Отправить файл по Url</h2>
                <input id="phone_filebyurl" placeholder="Телефон 79001231212">
                <input id="file_byurl" placeholder="URL файла">
                <button onclick="sendFileByUrl()">sendFileByUrl</button>
            </div>
        </div>
        <!-- RIGHT -->
        <div class="right">
            <h2>Ответ:</h2>
            <textarea id="response" readonly></textarea>
            <div id="status"></div>
        </div>  
    </div>
<script>
    function apiUrl() {
        return `https://3100.api.green-api.com/waInstance${idInstance.value}`;
    }

    function setStatus(type, text) {
        const el = document.getElementById("status");
        el.className = "status " + type;
        el.innerText = text;
    }

    async function request(url, options = {}) {
        const responseField = document.getElementById("response");
        
        responseField.value = "";
        setStatus("loading", "Loading...");

        try {
            const res = await fetch (url, options);
            const data = await res.json();

            responseField.value = JSON.stringify(data, null, 2);

            if (res.ok) {
                setStatus("success", "Успешно");
            } else {
                setStatus("error", "Ошибка API");
            }
        } catch (e) {
            responseField.value = e.message;
            setStatus ("error", "Ошибка сети");
        }
    }

    function getSettings() {
        request(`${apiUrl()}/getSettings/${apiToken.value}`);
    }
    function getStateInstance() {
        request (`${apiUrl()}/getStateInstance/${apiToken.value}`);
    }
    function sendMessage() {
        const phoneValue = document.getElementById("phone_message").value;
        const messageValue = document.getElementById("message").value;

        const body = {
            chatId: phoneValue + "@c.us",
            message: messageValue
        };
        request(`${apiUrl()}/sendMessage/${apiToken.value}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });
    }
    function sendFileByUrl() {
        const phoneValue = document.getElementById("phone_filebyurl").value;
        const urlValue = document.getElementById("file_byurl").value;

        const body = {
            chatId: phoneValue + "@c.us",
            urlFile: urlValue,
            fileName: "file" 
        };

        request(`${apiUrl()}/sendFileByUrl/${apiToken.value}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });
    }
    
</script>

</body>
</html>
