<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>GREEN API test</title>
    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', 'Courier New', monospace;
        background: linear-gradient(135deg, #c0cafa, #d1a5fd);
        min-height: 100vh;
        padding: 20px 0 20px 50px; /* отступ слева 50px */
    }

    /* Контейнер — две колонки по 350px, высота 900px */
    .wrapper {
        display: flex;
        gap: 20px;
        width: auto;
        height: 900px;
    }

    /* Левая панель — ширина 350px, высота 900px */
    .left {
        width: 350px;
        height: 900px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        padding: 20px;
        overflow-y: auto;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    /* Правая панель — ширина 350px, высота 900px, белый фон */
    .right {
        width: 350px;
        height: 900px;
        background: white;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* Секции внутри левой панели */
    .section {
        display: flex;
        flex-direction: column;
        gap: 12px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 16px;
    }
    .section:last-child {
        border-bottom: none;
        padding-bottom: 0;
    }

    /* Все поля ввода (input), textarea и кнопки — ширина 100% */
    .left input,
    .left textarea,
    .left button {
        width: 100%;
        font-family: inherit;
        font-size: 0.9rem;
        border-radius: 8px;
        outline: none;
        transition: all 0.2s;
    }

    /* Обычные поля input (кроме message textarea) */
    .left input {
        padding: 10px 14px;
        border: 1px solid #ccc;
        background: white;
        height: 42px;           /* стандартная высота */
    }

    /* Текстовое поле сообщения — в 2 раза выше обычного input (42px * 2 = 84px) */
    .left textarea#message {
        padding: 10px 14px;
        border: 1px solid #ccc;
        background: white;
        height: 84px;           /* ровно в 2 раза выше */
        resize: vertical;       /* пользователь может менять высоту, но начальная 84px */
        line-height: 1.4;
    }

    /* Кнопки */
    .left button {
        padding: 10px 14px;
        background: #1e2a3a;
        color: white;
        font-weight: 600;
        border: none;
        cursor: pointer;
        height: 42px;
    }
    .left button:hover {
        background: #0f1722;
        transform: translateY(-1px);
    }

    .left input:focus,
    .left textarea:focus {
        border-color: #6c63ff;
        box-shadow: 0 0 0 2px rgba(108,99,255,0.2);
    }

    /* Заголовок справа */
    .right h2 {
        font-size: 1.3rem;
        margin: 0;
        color: #1e2a3a;
        border-left: 4px solid #6c63ff;
        padding-left: 12px;
    }

    /* Поле ответа — белый фон, черный текст, заполняет оставшееся пространство */
    .right textarea#response {
        width: 100%;
        flex: 1;
        background: white;
        color: #1e1e2f;
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 12px;
        resize: none;
        line-height: 1.5;
    }

    /* Статус */
    #status {
        background: #f1f5f9;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.8rem;
        text-align: center;
        color: #1e293b;
    }

    .status.loading { background: #fef9c3; color: #854d0e; }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error   { background: #fee2e2; color: #991b1b; }

    /* Стилизация скролла левой панели */
    .left::-webkit-scrollbar {
        width: 6px;
    }
    </style>
</head>

<body>
    <div class="wrapper">
        <!-- LEFT -->
        <div class="left">
            <div class="section">
                <!--<h2>Реквизиты подключения</h2>-->
                <input id="idInstance" placeholder="idInstance">
                <input id="apiToken" placeholder="ApiTokenInstance">
            </div>
            <div class="section">
                <!--<h2>Методы</h2>-->
                <button onclick="getSettings()">getSettings</button>
                <button onclick="getStateInstance()">getStateInstance</button>
            </div>
            <div class="section">
                <!--<h2>Отправить сообщение</h2>-->
                <input id="phone_message" placeholder="79001231212">
                <textarea id="message" name="message" placeholder="Текст сообщения"></textarea>
                <button onclick="sendMessage()">sendMessage</button>
            </div>
            <div class="section">
                <!--<h2>Отправить файл по Url</h2>-->
                <input id="phone_filebyurl" placeholder="79001231212">
                <input id="url_filebyurl" placeholder="URL файла">
                <button onclick="sendFileByUrl()">sendFileByUrl</button>
            </div>
        </div>
        <!-- RIGHT -->
        <div class="right">
            <h2>Ответ:</h2>
            <textarea id="response" readonly></textarea>
            <div id="status"></div>
        </div>
    </div>
    <script>
        function getInstance() {
            return document.getElementById('idInstance').value.trim();
        }

        function getApiToken() {
            return document.getElementById('apiToken').value.trim();
        }

        function apiUrl() {
            const idInstance = getInstance();
            if (!idInstance) return '';
            return `https://3100.api.green-api.com/waInstance${idInstance}`;
        }

        function validateCredentials() {
            const idInstance = getInstance();
            const token = getApiToken();

            if (!idInstance || !token) {
                alert('Не заполнен idInstance или ApiTokenInstance')
                return false;
            }
            return true;
        }

        function setStatus(type, text) {
            const el = document.getElementById("status");
            el.className = "status " + type;
            el.innerText = text;
        }

        async function request(url, options = {}) {
            const responseField = document.getElementById("response");

            responseField.value = "";
            setStatus("loading", "Loading...");

            try {
                const res = await fetch(url, options);
                const data = await res.json();

                responseField.value = JSON.stringify(data, null, 2);

                if (res.ok) {
                    setStatus("success", "Успешно");
                } else {
                    setStatus("error", "Ошибка API");
                }
            } catch (e) {
                responseField.value = e.message;
                setStatus("error", "Ошибка сети");
            }
        }

        function getSettings() {
            if (!validateCredentials()) return;
            request(`${apiUrl()}/getSettings/${getApiToken()}`);
        }
        function getStateInstance() {
            if (!validateCredentials()) return;
            request(`${apiUrl()}/getStateInstance/${getApiToken()}`);
        }
        function sendMessage() {
            if (!validateCredentials()) return;
            const phoneValue = document.getElementById("phone_message").value;
            const messageValue = document.getElementById("message").value;

            if (!phoneValue || !messageValue) {
                alert("Введите номер и текст сообщения");
                return;
            }

            const body = {
                chatId: phoneValue + "@c.us",
                message: messageValue
            };
            request(`${apiUrl()}/sendMessage/${getApiToken()}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
        }
        function sendFileByUrl() {
            if (!validateCredentials()) return;
            const phoneValue = document.getElementById("phone_filebyurl").value;
            const urlValue = document.getElementById("url_filebyurl").value;

            if (!phoneValue || !urlValue) {
                alert("Введите номер и URL файла");
                return;
            }

            const body = {
                chatId: phoneValue + "@c.us",
                urlFile: urlValue,
                fileName: "file"
            };

            request(`${apiUrl()}/sendFileByUrl/${getApiToken()}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
        }

    </script>

</body>

</html>
