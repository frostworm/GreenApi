<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GREEN API test</title>
<style>
.wrapper {
    display: flex;
    gap: 20px;
    }
.left {
    width: 300px;
}
.right {
    flex: 1;
}
textarea {
    width: 300px;
    height: 600px;
}
</style>
</head>
<body>
    <div class="wrapper">
        <!-- LEFT -->
        <div class="left">
            <div class="section">
                <h2>Реквизиты подключения</h2>
                <input id="idInstance" placeholder="idInstance">
                <input id="apiToken" placeholder="ApiTokenInstance">
            </div>
            <div class="section">
                <h2>Методы</h2>
                <button onclick="getSettings()">getSettings</button>
                <button onclick="getStateInstance()">getStateInstance</button>
            </div>
            <div class="section">
                <h2>Отправить сообщение</h2>
                <input id="phone_message" placeholder="79001231212">
                <input id="message" placeholder="Текст сообщения">
                <button onclick = "sendMessage()">sendMessage</button>
            </div>
            <div class="section">
                <h2>Отправить файл по Url</h2>
                <input id="phone_filebyurl" placeholder="79001231212">
                <input id="url_filebyurl" placeholder="URL файла">
                <button onclick="sendFileByUrl()">sendFileByUrl</button>
            </div>
        </div>
        <!-- RIGHT -->
        <div class="right">
            <h2>Ответ:</h2>
            <textarea id="response" readonly></textarea>
            <div id="status"></div>
        </div>  
    </div>
<script>
    function getInstance() {
        return document.getElementById('idInstance').value.trim();
    }

    function getApiToken() {
        return document.getElementById('apiToken').value.trim();
    }

    function apiUrl() {
        const idInstance = getInstance();
        if(!idInstance) return '';
        return `https://3100.api.green-api.com/waInstance${idInstance}`;
    }

    function validateCredentials() {
        const idInstance = getInstance();
        const token = getApiToken();

        if (!idInstance||!token) {
            alert('Не заполнен idInstance или ApiTokenInstance')
            return false;
        }
        return true;
    }

    function setStatus(type, text) {
        const el = document.getElementById("status");
        el.className = "status " + type;
        el.innerText = text;
    }

    async function request(url, options = {}) {
        const responseField = document.getElementById("response");
        
        responseField.value = "";
        setStatus("loading", "Loading...");

        try {
            const res = await fetch (url, options);
            const data = await res.json();

            responseField.value = JSON.stringify(data, null, 2);

            if (res.ok) {
                setStatus("success", "Успешно");
            } else {
                setStatus("error", "Ошибка API");
            }
        } catch (e) {
            responseField.value = e.message;
            setStatus ("error", "Ошибка сети");
        }
    }

    function getSettings() {
        if (!validateCredentials()) return;
        request(`${apiUrl()}/getSettings/${getApiToken()}`);
    }
    function getStateInstance() {
        if (!validateCredentials()) return;
        request (`${apiUrl()}/getStateInstance/${getApiToken()}`);
    }
    function sendMessage() {
        if (!validateCredentials()) return;
        const phoneValue = document.getElementById("phone_message").value;
        const messageValue = document.getElementById("message").value;

        if (!phoneValue || !messageValue) {
            alert("Введите номер и текст сообщения");
            return;
        }

        const body = {
            chatId: phoneValue + "@c.us",
            message: messageValue
        };
        request(`${apiUrl()}/sendMessage/${getApiToken()}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });
    }
    function sendFileByUrl() {
        if (!validateCredentials()) return;
        const phoneValue = document.getElementById("phone_filebyurl").value;
        const urlValue = document.getElementById("url_filebyurl").value;

        if (!phoneValue || !urlValue) {
            alert("Введите номер и URL файла");
            return;
        }

        const body = {
            chatId: phoneValue + "@c.us",
            urlFile: urlValue,
            fileName: "file" 
        };

        request(`${apiUrl()}/sendFileByUrl/${getApiToken()}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });
    }
    
</script>

</body>
</html>
